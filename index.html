<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Le Wagon - Web Development Sprint</title>

  <link href="https://fonts.googleapis.com/css?family=Chivo:700|Overpass:400,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Banner -->

  <div class="banner">
    <div class="container">
      <h1>Change your life, learn to code</h1>
      <p>Le Wagon brings technical skills to creative people.</p>

      <a href="https://www.lewagon.com/" class="button-blue">
        Apply now
      </a>
    </div>
  </div>

  <!-- Cards -->

  <div class="container">

    <h2>Discover our campuses</h2>

    <div class="cards">

      <div class="card-white">
        <img src="images/shanghai.jpg" alt="Shanghai">
        <h3>Shanghai</h3>
        <p>Learn to code in China.</p>
      </div>

      <div class="card-white">
        <img src="images/london.jpg" alt="London">
        <h3>London</h3>
        <p>Learn to code in England.</p>
      </div>

      <div class="card-white">
        <img src="images/paris.jpg" alt="Paris">
        <h3>Paris</h3>
        <p>Learn to code in France.</p>
      </div>

    </div>

  </div>

  <!-- Footer -->

  <div class="footer">
    <div class="container">
      <p>Website made with ❤️ at Le Wagon</p>
    </div>
  </div>

</body>

</html>
